    <meta

    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c5cff" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://makebetterresume.com/" />
    <meta
      property="og:title"
      content="Make Better Resume - AI-Powered Resume Generator"
    />
    <meta
      property="og:description"
      content="Generate high-impact resumes using AI. Combine your experience with real-world hiring data."
    />
    <meta
      property="og:image"
      content="https://makebetterresume.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Make Better Resume" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://makebetterresume.com/" />
    <meta
      name="twitter:title"
      content="Make Better Resume - AI Resume Generator"
    />
    <meta
      name="twitter:description"
      content="Generate high-impact resumes using AI and real-world hiring data."
    />
    <meta
      name="twitter:image"
      content="https://makebetterresume.com/og-image.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://makebetterresume.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" sizes="256x256" />
    <link rel="shortcut icon" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Make Better Resume - AI Resume Generator | Join Our Waitlist</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD Schema for Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Make Better Resume",
        "description": "AI-powered resume generator that combines your experience with real-world hiring data",
        "url": "https://makebetterresume.com",
        "image": "https://makebetterresume.com/og-image.png",
        "applicationCategory": "BusinessApplication",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "1250"
        }
      }
    </script>
  </head>
  <body
    style="
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      color: white;
    "
  >
    <div style="max-width: 80vw">
      <div class="card">
        <h1 style="">
          Make
          <span
            style="
              background: linear-gradient(90deg, #7c7c7c, #ffffff);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >Better</span
          >
          <span>Resume</span>
        </h1>
        <p>
          Generate better resumes using AI. Tailor resumes to specific job
          descriptions using your data.
        </p>
        <form id="waitlist-form" class="form">
          <input
            type="email"
            placeholder="Enter your email"
            required
            class="input"
          />
          <button type="submit" class="button">Join Waitlist</button>
        </form>
      </div>
    </div>
  </body>
  <script>
    const form = document.getElementById("waitlist-form");
    const input = form.querySelector('input[type="email"]');
    const button = form.querySelector("button");

    function resetUI() {
      button.innerText = "Join Waitlist";
      button.style.background = "";
      button.style.color = "";
      button.disabled = false;
    }

    input.addEventListener("input", resetUI);

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = input.value.trim();
      if (!email) return;

      button.innerText = "Joining...";
      button.disabled = true;

      try {
        const response = await fetch("/waitlist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await response.json();

        if (response.ok || data.error === "Email already exists") {
          button.innerText = "Joined ✓";
          button.style.background = "#ffffff";
          button.style.color = "#000000";
          input.value = "";
        } else {
          button.innerText = "Error: " + data.error;
          button.style.background = "#ff6b6b";
          button.style.color = "#ffffff";
          button.disabled = false;
        }
      } catch (error) {
        button.innerText = "Failed to join";
        button.style.background = "#ff6b6b";
        button.disabled = false;
      }
    });
  </script>
</html>
